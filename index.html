<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Finance Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #0b1220;
  color: white;
}

/* LOGIN */
.login {
  position: fixed;
  inset: 0;
  background: #0b1220;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-box {
  width: 300px;
  padding: 20px;
  background: #111a2e;
  border-radius: 15px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  padding: 20px;
  border-radius: 0 0 20px 20px;
}

.balance {
  font-size: 28px;
  font-weight: bold;
}

/* TABLE */
.table {
  padding: 15px;
}

.row {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  background: #111a2e;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  align-items: center;
}

.income { color: #4ade80; }
.expense { color: #f87171; }

button {
  margin-top: 10px;
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #00c6ff;
  color: black;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-box">
    <h3>Вход</h3>
    <input type="password" id="pass" placeholder="Пароль">
    <button onclick="login()">Войти</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <div class="header">
    <div>Баланс</div>
    <div class="balance" id="balance">0 €</div>

    <select id="filter" onchange="render()">
      <option value="all">Все</option>
      <option value="income">Доходы</option>
      <option value="expense">Расходы</option>
    </select>
  </div>

  <div class="table">
    <input id="desc" placeholder="Описание">
    <input id="amount" type="number" placeholder="Сумма">

    <select id="type">
      <option value="income">Доход</option>
      <option value="expense">Расход</option>
    </select>

    <input id="date" type="date">

    <button onclick="add()">Добавить</button>

    <div id="list"></div>
  </div>
</div>

<script>

let PASSWORD = "1234";
let data = JSON.parse(localStorage.getItem("data")) || [];

function login(){
  let p = document.getElementById("pass").value;
  if(p === PASSWORD){
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    render();
  } else {
    alert("Неверный пароль");
  }
}

function save(){
  localStorage.setItem("data", JSON.stringify(data));
}

function add(){
  let desc = desc = document.getElementById("desc").value;
  let amount = +document.getElementById("amount").value;
  let type = document.getElementById("type").value;
  let date = document.getElementById("date").value;

  if(!desc || !amount || !date) return;

  data.push({desc, amount, type, date});
  save();
  render();
}

function remove(i){
  data.splice(i,1);
  save();
  render();
}

/* SORT BY DATE */
function sortData(list){
  return list.sort((a,b)=> new Date(b.date) - new Date(a.date));
}

function render(){
  let list = document.getElementById("list");
  let filter = document.getElementById("filter").value;

  list.innerHTML = "";

  let filtered = data.filter(t => {
    if(filter === "all") return true;
    return t.type === filter;
  });

  filtered = sortData(filtered);

  let balance = 0;

  filtered.forEach((t,i)=>{
    let val = t.type === "income" ? t.amount : -t.amount;
    balance += val;

    let row = document.createElement("div");
    row.className = "row";

    row.innerHTML = `
      <div>${t.desc}<br><small>${t.date}</small></div>
      <div class="${t.type}">
        ${t.type === "income" ? "+" : "-"}${t.amount}
      </div>
      <button onclick="remove(${i})">X</button>
    `;

    list.appendChild(row);
  });

  document.getElementById("balance").innerText = balance + " €";
}

</script>

</body>
</html>
