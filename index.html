<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NeoBank</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #0a0f1c;
  color: white;
}

/* LOGIN */
.login {
  position: fixed;
  inset: 0;
  background: #0a0f1c;
  display: flex;
  align-items: center;
  justify-content: center;
}

.box {
  background: #111a2e;
  padding: 20px;
  border-radius: 15px;
  width: 280px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

/* HEADER */
.header {
  padding: 20px;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  border-radius: 0 0 20px 20px;
}

.balance {
  font-size: 34px;
  font-weight: bold;
}

/* CARDS */
.card {
  background: #111a2e;
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
}

/* ROWS */
.row {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  padding: 12px;
  margin-top: 10px;
  background: #111a2e;
  border-radius: 12px;
}

.income { color: #4ade80; }
.expense { color: #f87171; }

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #00c6ff;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="box">
    <h3>NeoBank Login</h3>
    <input type="password" id="pin" placeholder="PIN">
    <button onclick="login()">Войти</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <div class="header">
    <div>Баланс</div>
    <div class="balance" id="balance">0 €</div>
  </div>

  <div class="card">
    <h3>Добавить операцию</h3>

    <input id="desc" placeholder="Описание">
    <input id="amount" type="number" placeholder="Сумма">

    <select id="type">
      <option value="income">Доход</option>
      <option value="expense">Расход</option>
    </select>

    <input id="date" type="date">

    <button onclick="add()">Добавить</button>
  </div>

  <div class="card">
    <h3>График расходов</h3>
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <h3>Операции</h3>
    <div id="list"></div>
  </div>

</div>

<script>

let PIN = "1234";
let data = JSON.parse(localStorage.getItem("bank")) || [];
let chart;

function login(){
  let p = document.getElementById("pin").value;
  if(p === PIN){
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    render();
  } else alert("Неверный PIN");
}

function save(){
  localStorage.setItem("bank", JSON.stringify(data));
}

function add(){
  let desc = document.getElementById("desc").value;
  let amount = +document.getElementById("amount").value;
  let type = document.getElementById("type").value;
  let date = document.getElementById("date").value;

  if(!desc || !amount || !date) return;

  data.push({desc, amount, type, date});
  save();
  render();
}

function remove(i){
  data.splice(i,1);
  save();
  render();
}

function render(){
  let list = document.getElementById("list");
  list.innerHTML = "";

  let balance = 0;
  let expenseByDay = {};

  data.sort((a,b)=> new Date(b.date) - new Date(a.date));

  data.forEach((t,i)=>{
    let val = t.type === "income" ? t.amount : -t.amount;
    balance += val;

    if(t.type === "expense"){
      expenseByDay[t.date] = (expenseByDay[t.date] || 0) + t.amount;
    }

    let row = document.createElement("div");
    row.className = "row";

    row.innerHTML = `
      <div>${t.desc}<br><small>${t.date}</small></div>
      <div class="${t.type}">
        ${t.type==="income"?"+":"-"}${t.amount}
      </div>
      <button onclick="remove(${i})">X</button>
    `;

    list.appendChild(row);
  });

  document.getElementById("balance").innerText = balance + " €";

  drawChart(expenseByDay);
}

function drawChart(dataMap){
  let ctx = document.getElementById("chart");

  if(chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: Object.keys(dataMap),
      datasets: [{
        label: "Расходы",
        data: Object.values(dataMap)
      }]
    }
  });
}

</script>

</body>
</html>
