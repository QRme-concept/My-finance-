<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NeoBank PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #0a0f1c;
  color: white;
}

/* AUTH */
.auth {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0a0f1c;
}

.box {
  width: 320px;
  background: #111a2e;
  padding: 20px;
  border-radius: 15px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  box-sizing: border-box;
}

/* HEADER */
.header {
  padding: 20px;
  background: linear-gradient(135deg,#00c6ff,#0072ff);
  border-radius: 0 0 20px 20px;
}

.balance {
  font-size: 32px;
  font-weight: bold;
}

/* CARDS */
.card {
  margin: 15px;
  background: #111a2e;
  padding: 15px;
  border-radius: 15px;
}

/* BANK CARDS */
.bank-card {
  padding: 15px;
  border-radius: 15px;
  margin-top: 10px;
  background: linear-gradient(135deg,#1e3a8a,#2563eb);
}

.bank-card:nth-child(2){
  background: linear-gradient(135deg,#065f46,#10b981);
}

.bank-card:nth-child(3){
  background: linear-gradient(135deg,#7c2d12,#f97316);
}

/* ROW */
.row {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  padding: 12px;
  margin-top: 10px;
  background: #111a2e;
  border-radius: 12px;
  align-items: center;
}

.income { color: #4ade80; }
.expense { color: #f87171; }

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #00c6ff;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- AUTH -->
<div class="auth" id="auth">
  <div class="box">
    <h3>Регистрация / вход</h3>

    <input id="user" placeholder="Логин">
    <input id="pass" type="password" placeholder="Пароль">

    <button onclick="register()">Регистрация</button>
    <button onclick="login()">Войти</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <div class="header">
    <div>Баланс</div>
    <div class="balance" id="balance">0 ₽</div>
  </div>

  <div class="card">
    <h3>💳 Карты</h3>
    <div id="cards"></div>
  </div>

  <div class="card">
    <h3>Операция</h3>

    <input id="desc" placeholder="Описание">
    <input id="amount" type="number" placeholder="Сумма">

    <select id="type">
      <option value="income">Доход</option>
      <option value="expense">Расход</option>
    </select>

    <input id="date" type="date">

    <button onclick="add()">Добавить</button>
  </div>

  <div class="card">
    <h3>📊 График</h3>
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <h3>История</h3>
    <div id="list"></div>
  </div>

</div>

<script>

let currentUser = null;
let chart;

/* USERS */
function getUsers(){
  return JSON.parse(localStorage.getItem("users")) || {};
}

function saveUsers(u){
  localStorage.setItem("users", JSON.stringify(u));
}

/* REGISTER */
function register(){
  let u = user.value;
  let p = pass.value;

  if(!u || !p) return alert("Заполни поля");

  let users = getUsers();

  if(users[u]) return alert("Пользователь уже есть");

  users[u] = {
    pass: p,
    balance: 0,
    cards: [
      {name:"Visa Gold", balance:10000},
      {name:"MasterCard", balance:5000},
      {name:"Digital Card", balance:2000}
    ],
    data:[]
  };

  saveUsers(users);
  alert("Готово! Теперь войди");
}

/* LOGIN */
function login(){
  let u = user.value;
  let p = pass.value;

  let users = getUsers();

  if(!users[u] || users[u].pass !== p){
    return alert("Ошибка входа");
  }

  currentUser = u;

  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";

  render();
}

/* SAVE */
function save(){
  let users = getUsers();
  users[currentUser] = state();
  saveUsers(users);
}

/* STATE */
function state(){
  return users[currentUser];
}

function users(){
  return getUsers();
}

/* ADD */
function add(){
  let s = getUsers()[currentUser];

  let desc = document.getElementById("desc").value;
  let amount = +document.getElementById("amount").value;
  let type = document.getElementById("type").value;
  let date = document.getElementById("date").value;

  if(!desc || !amount || !date) return;

  s.data.push({desc,amount,type,date});

  saveUsers(getUsers());
  render();
}

/* CARDS UPDATE */
function updateCard(i,val){
  let u = getUsers();
  let userData = u[currentUser];

  userData.cards[i].balance = +val;

  saveUsers(u);
  render();
}

/* RENDER */
function render(){
  let u = getUsers()[currentUser];

  let list = document.getElementById("list");
  let cards = document.getElementById("cards");

  list.innerHTML = "";
  cards.innerHTML = "";

  let balance = 0;
  let inc = 0;
  let exp = 0;

  let byDay = {};

  u.data.sort((a,b)=> new Date(b.date)-new Date(a.date));

  u.data.forEach((t,i)=>{

    let val = t.type==="income"?t.amount:-t.amount;
    balance += val;

    if(t.type==="income") inc += t.amount;
    else exp += t.amount;

    byDay[t.date] = (byDay[t.date]||0) + val;

    let row = document.createElement("div");
    row.className="row";

    row.innerHTML=`
      <div>${t.desc}<br><small>${t.date}</small></div>
      <div class="${t.type}">
        ${t.type==="income"?"+":"-"}${t.amount}
      </div>
      <button onclick="remove(${i})">X</button>
    `;

    list.appendChild(row);
  });

  /* CARDS */
  u.cards.forEach((c,i)=>{
    let div = document.createElement("div");
    div.className="bank-card";

    div.innerHTML=`
      <div>${c.name}</div>
      <input type="number" value="${c.balance}" 
        onchange="updateCard(${i},this.value)">
    `;

    cards.appendChild(div);
  });

  document.getElementById("balance").innerText = balance + " ₽";

  drawChart(inc,exp);
}

/* DELETE */
function remove(i){
  let u = getUsers();
  u[currentUser].data.splice(i,1);
  saveUsers(u);
  render();
}

/* CHART */
function drawChart(inc,exp){
  let ctx=document.getElementById("chart");

  if(chart) chart.destroy();

  chart=new Chart(ctx,{
    type:"doughnut",
    data:{
      labels:["Доход","Расход"],
      datasets:[{
        data:[inc,exp]
      }]
    }
  });
}

</script>

</body>
</html>
