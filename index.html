<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Finance App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #0f172a;
  color: white;
}

.container {
  padding: 20px;
  max-width: 600px;
  margin: auto;
}

.card {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
}

.balance {
  font-size: 32px;
  font-weight: bold;
}

.small {
  opacity: 0.7;
}

input, select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

button {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: none;
  margin-top: 10px;
  background: #22c55e;
  color: white;
  font-weight: bold;
}

.item {
  background: #1e293b;
  padding: 15px;
  border-radius: 15px;
  margin-top: 10px;
  display: flex;
  justify-content: space-between;
}

.income { color: #4ade80; }
.expense { color: #f87171; }
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <div class="small">Текущий баланс</div>
    <div class="balance" id="balance">0 ₽</div>
  </div>

  <input id="desc" placeholder="Описание">
  <input id="amount" type="number" placeholder="Сумма">

  <select id="type">
    <option value="income">Доход</option>
    <option value="expense">Расход</option>
  </select>

  <button onclick="add()">Добавить</button>

  <div id="list"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem('data')) || [];

function save(){
  localStorage.setItem('data', JSON.stringify(data));
}

function add(){
  let desc = document.getElementById('desc').value;
  let amount = +document.getElementById('amount').value;
  let type = document.getElementById('type').value;

  if(!desc || !amount) return;

  data.push({desc, amount, type});
  save();
  render();
}

function remove(i){
  data.splice(i,1);
  save();
  render();
}

function render(){
  let list = document.getElementById('list');
  let balance = 0;
  list.innerHTML = "";

  data.forEach((t,i)=>{
    let value = t.type === "income" ? t.amount : -t.amount;
    balance += value;

    let div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <span>${t.desc}</span>
      <span class="${t.type}">
        ${t.type === "income" ? "+" : "-"}${t.amount}
      </span>
      <button onclick="remove(${i})">X</button>
    `;

    list.appendChild(div);
  });

  document.getElementById('balance').innerText = balance + " €";
}

render();
</script>

</body>
</html>
