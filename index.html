<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NeoBank Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #0a0f1c;
  color: white;
}

/* AUTH */
.auth {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0a0f1c;
}

.box {
  width: 320px;
  background: #111a2e;
  padding: 20px;
  border-radius: 15px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  box-sizing: border-box;
  height: 44px;
}

/* HEADER */
.header {
  padding: 20px;
  background: linear-gradient(135deg,#00c6ff,#0072ff);
  border-radius: 0 0 20px 20px;
}

.balance {
  font-size: 32px;
  font-weight: bold;
}

/* CARDS */
.card {
  margin: 15px;
  background: #111a2e;
  padding: 15px;
  border-radius: 15px;
}

/* BANK CARD */
.bank-card {
  padding: 12px;
  border-radius: 12px;
  margin-top: 10px;
  background: linear-gradient(135deg,#1e3a8a,#2563eb);
}

/* ROW */
.row {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  padding: 12px;
  margin-top: 10px;
  background: #111a2e;
  border-radius: 12px;
  align-items: center;
}

.income { color: #4ade80; }
.expense { color: #f87171; }

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #00c6ff;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- AUTH -->
<div class="auth" id="auth">
  <div class="box">
    <h3>NeoBank вход</h3>
    <input id="user" placeholder="Логин">
    <input id="pass" type="password" placeholder="Пароль">
    <button onclick="register()">Регистрация</button>
    <button onclick="login()">Войти</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <div class="header">
    <div>Баланс</div>
    <div class="balance" id="balance">0 ₽</div>
  </div>

  <div class="card">
    <h3>💳 Карты</h3>
    <div id="cards"></div>
  </div>

  <div class="card">
    <h3>Операция</h3>

    <input id="desc" placeholder="Описание">
    <input id="amount" type="number" placeholder="Сумма">

    <input id="date" type="date">

    <select id="type">
      <option value="income">Доход</option>
      <option value="expense">Расход</option>
    </select>

    <!-- CATEGORY -->
    <select id="cat">
      <option>Еда</option>
      <option>Транспорт</option>
      <option>Развлечения</option>
      <option>Зарплата</option>
      <option>Подарки</option>
      <option>Коммуналка</option>
      <option>Другое</option>
    </select>

    <!-- CARD -->
    <select id="cardSelect"></select>

    <button onclick="add()">Добавить</button>
  </div>

  <div class="card">
    <h3>📊 Доходы</h3>
    <canvas id="incomeChart"></canvas>
  </div>

  <div class="card">
    <h3>📊 Расходы</h3>
    <canvas id="expenseChart"></canvas>
  </div>

  <div class="card">
    <h3>История</h3>
    <div id="list"></div>
  </div>

</div>

<script>

let currentUser = null;
let incomeChart, expenseChart;

/* USERS */
function getUsers(){
  return JSON.parse(localStorage.getItem("users")) || {};
}

function saveUsers(u){
  localStorage.setItem("users", JSON.stringify(u));
}

/* REGISTER */
function register(){
  let u=user.value;
  let p=pass.value;
  let users=getUsers();

  if(users[u]) return alert("Пользователь уже есть");

  users[u]={
    pass:p,
    cards:[
      {name:"Visa Gold", balance:10000, color:"#2563eb"},
      {name:"MasterCard", balance:5000, color:"#10b981"},
      {name:"Digital", balance:2000, color:"#f97316"}
    ],
    data:[]
  };

  saveUsers(users);
  alert("Готово");
}

/* LOGIN */
function login(){
  let u=user.value;
  let p=pass.value;

  let users=getUsers();

  if(!users[u] || users[u].pass!==p){
    return alert("Ошибка входа");
  }

  currentUser=u;
  auth.style.display="none";
  app.style.display="block";

  render();
}

/* ADD */
function add(){
  let users=getUsers();
  let u=users[currentUser];

  let desc=document.getElementById("desc").value;
  let amount=+document.getElementById("amount").value;
  let date=document.getElementById("date").value;
  let type=document.getElementById("type").value;
  let cat=document.getElementById("cat").value;
  let cardIndex=+document.getElementById("cardSelect").value;

  if(!desc || !amount || !date) return;

  u.data.push({desc,amount,date,type,cat,cardIndex});

  saveUsers(users);
  render();
}

/* REMOVE */
function remove(i){
  let users=getUsers();
  users[currentUser].data.splice(i,1);
  saveUsers(users);
  render();
}

/* UPDATE CARD */
function updateCard(i, field, value){
  let users=getUsers();
  users[currentUser].cards[i][field]=value;
  saveUsers(users);
  render();
}

/* RENDER */
function render(){
  let users=getUsers();
  let u=users[currentUser];

  let list=document.getElementById("list");
  let cards=document.getElementById("cards");
  let select=document.getElementById("cardSelect");

  list.innerHTML="";
  cards.innerHTML="";
  select.innerHTML="";

  let income={}, expense={};
  let balance=0;

  u.data.sort((a,b)=>new Date(b.date)-new Date(a.date));

  /* SELECT CARDS */
  u.cards.forEach((c,i)=>{
    let opt=document.createElement("option");
    opt.value=i;
    opt.textContent=c.name;
    select.appendChild(opt);
  });

  /* TRANSACTIONS */
  u.data.forEach((t,i)=>{
    let val=t.type==="income"?t.amount:-t.amount;
    balance+=val;

    if(t.type==="income") income[t.cat]=(income[t.cat]||0)+t.amount;
    else expense[t.cat]=(expense[t.cat]||0)+t.amount;

    let row=document.createElement("div");
    row.className="row";

    row.innerHTML=`
      <div>${t.desc}<br><small>${t.cat} | ${t.date}</small></div>
      <div class="${t.type}">
        ${t.type==="income"?"+":"-"}${t.amount}
      </div>
      <button onclick="remove(${i})">X</button>
    `;

    list.appendChild(row);
  });

  document.getElementById("balance").innerText=balance+" ₽";

  /* CARDS BALANCE */
  u.cards.forEach((c,i)=>{

    let change=u.data
      .filter(t=>t.cardIndex===i)
      .reduce((s,t)=>s+(t.type==="income"?t.amount:-t.amount),0);

    let div=document.createElement("div");
    div.className="bank-card";
    div.style.background=c.color;

    div.innerHTML=`
      <input value="${c.name}" onchange="updateCard(${i},'name',this.value)">
      <input type="color" value="${c.color}" onchange="updateCard(${i},'color',this.value)">
      <input type="number" value="${c.balance}" onchange="updateCard(${i},'balance',this.value)">
      <div>Итог: ${c.balance + change} ₽</div>
    `;

    cards.appendChild(div);
  });

  draw(incomeChart,"incomeChart",income);
  draw(expenseChart,"expenseChart",expense);
}

/* CHART */
function draw(chart,id,data){
  let ctx=document.getElementById(id);

  if(chart) chart.destroy();

  chart=new Chart(ctx,{
    type:"doughnut",
    data:{
      labels:Object.keys(data),
      datasets:[{
        data:Object.values(data)
      }]
    }
  });

  if(id==="incomeChart") incomeChart=chart;
  if(id==="expenseChart") expenseChart=chart;
}
